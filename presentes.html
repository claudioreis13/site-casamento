<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Presentes 🎁 — Bruna & Cláudio</title>

  <!-- SEO & Open Graph -->
  <meta name="description" content="Lista de presentes do casamento de Bruna e Cláudio. Escolha o seu presente e surpreenda os noivos!">
  <meta property="og:title" content="Lista de Presentes 🎁 — Bruna & Cláudio">
  <meta property="og:description" content="Escolha um presente especial para o casamento de Bruna e Cláudio em 10/10/2026!">
  <meta property="og:image" content="imagens/casamento.jpg">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_BR">

  <!-- Preload fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bruna & Cláudio 💍 — 10/10/2026">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="nav-placeholder"></div>

<!-- HERO -->
<div class="hero hero-cerimonia">
  <h1 style="font-size:52px">Lista de Presentes</h1>
  <h2>Escolha algo especial para celebrar conosco 🎁</h2>
</div>

<section>

  <!-- Barra de controles — colapsável no mobile -->
  <div class="controles-barra" id="controles-barra">

    <div class="controles-topo">
      <div class="busca-wrap">
        <label for="busca-presente" class="busca-icone" title="Buscar presente">🔍</label>
        <input 
          type="text" 
          id="busca-presente" 
          placeholder="Buscar presente..."
          aria-label="Buscar entre os presentes de casamento"
        >
      </div>
      <button 
        class="btn-filtros-toggle" 
        id="btn-filtros-toggle" 
        onclick="toggleFiltros()" 
        aria-expanded="false"
        type="button"
        aria-label="Abrir painel de filtros"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="7" y1="12" x2="17" y2="12"/>
          <line x1="10" y1="18" x2="14" y2="18"/>
        </svg>
        Filtrar
        <span class="filtro-badge" id="filtro-badge" style="display:none" aria-live="polite">1</span>
      </button>
    </div>

    <div class="controles-painel" id="controles-painel">
      <label for="filtro-preco">Filtrar por preço:</label>
      <select id="filtro-preco" aria-label="Filtrar presentes por faixa de preço">
        <option value="todos">Todos os preços</option>
        <option value="ate200">Até R$ 200</option>
        <option value="200a500">R$ 200 – R$ 500</option>
        <option value="500a1000">R$ 500 – R$ 1.000</option>
        <option value="acima1000">Acima de R$ 1.000</option>
      </select>
      
      <label for="ordenacao">Ordenar por:</label>
      <select id="ordenacao" aria-label="Ordenar presentes por">
        <option value="padrao">Ordenar por...</option>
        <option value="menor">Menor preço</option>
        <option value="maior">Maior preço</option>
        <option value="az">A → Z</option>
      </select>
      <button 
        class="btn-limpar" 
        id="btn-limpar" 
        style="display:none" 
        onclick="limparFiltros()"
        type="button"
        aria-label="Limpar todos os filtros"
      >
        ✕ Limpar
      </button>
    </div>

    <div class="controles-rodape">
      <span id="contador-resultados"></span>
    </div>

  </div>

  <!-- Cards gerados pelo JS a partir do array PRESENTES -->
  <div class="lista-presentes"></div>

</section>

<div id="footer-placeholder"></div>

<!-- MODAL -->
<div 
  id="modal" 
  class="modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-title"
  aria-hidden="true"
>
  <div class="modal-conteudo">

    <button 
      class="fechar" 
      onclick="fecharModal()" 
      aria-label="Fechar diálogo"
      type="button"
    >
      &times;
    </button>

    <h2 id="modal-title">💖 Obrigado pelo presente!</h2>

    <img 
      id="modal-img" 
      src="" 
      alt="Imagem do presente selecionado"
      class="modal-img-presente" 
      onclick="abrirLightbox()" 
      title="Clique para ampliar"
      loading="lazy"
      decoding="async"
    >
    <p class="modal-nome-presente" id="modal-nome"></p>
    <p id="modal-valor"></p>

    <p><strong>PIX:</strong></p>
    <p id="modal-pix"></p>

    <div class="modal-botoes">

      <button 
        class="btn-pix" 
        onclick="copiarPix()"
        type="button"
        aria-label="Copiar código PIX para transferência"
      >
        Copiar PIX
      </button>
      <p 
        class="modal-proximo-passo" 
        id="modal-proximo-passo" 
        style="display:none"
        role="status"
        aria-live="polite"
      >
        Agora abra seu banco e cole o PIX para finalizar 🎉
      </p>

      <a 
        id="btn-whatsapp-modal" 
        href="#" 
        target="_blank" 
        class="btn-whatsapp"
        aria-label="Conversar com a Bruna via WhatsApp"
      >
        <svg class="wpp-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Combine com a Bruna
      </a>

      <button 
        class="btn-fechar" 
        onclick="fecharModal()"
        type="button"
        aria-label="Fechar diálogo"
      >
        Fechar
      </button>

    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<dialog id="lightbox" class="lightbox" onclick="this.close()">
  <img 
    id="lightbox-img" 
    src="" 
    alt="Imagem ampliada do presente"
    loading="lazy"
    decoding="async"
  >
  <p id="lightbox-titulo" class="lightbox-titulo"></p>
  <button class="lightbox-fechar" onclick="document.getElementById('lightbox').close()" aria-label="Fechar">×</button>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
