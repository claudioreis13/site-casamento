<body>

<div id="nav-placeholder"></div>

<!-- HERO -->
<div class="hero">
  <h1>Bruna & Cláudio</h1>
  <div class="hero-divisor"></div>
  <h2>Depois de tanto esperar, chegou a hora de dizer sim.</h2>
</div>


<!-- CONTEÚDO -->
<section class="section-inicio reveal">

  <p class="boas-vindas-texto">Estamos muito felizes em compartilhar esse momento especial com você 💕</p>

  <h2 class="contador-titulo">Faltam</h2>

  <div class="contador-circular" role="timer" aria-label="Contagem regressiva para o casamento" aria-live="polite">

    <div class="arco-item" id="arco-item-dias" aria-label="Dias">
      <div class="arco-wrap">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle class="arco-track" cx="40" cy="40" r="34"/>
          <circle class="arco-prog" id="arco-dias" cx="40" cy="40" r="34"/>
        </svg>
        <div class="arco-inner">
          <span class="arco-num" id="dias">00</span>
        </div>
      </div>
      <span class="arco-lbl">Dias</span>
    </div>

    <div class="arco-item" id="arco-item-horas" aria-label="Horas">
      <div class="arco-wrap">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle class="arco-track" cx="40" cy="40" r="34"/>
          <circle class="arco-prog" id="arco-horas" cx="40" cy="40" r="34"/>
        </svg>
        <div class="arco-inner">
          <span class="arco-num" id="horas">00</span>
        </div>
      </div>
      <span class="arco-lbl">Horas</span>
    </div>

    <div class="arco-item" id="arco-item-minutos" aria-label="Minutos">
      <div class="arco-wrap">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle class="arco-track" cx="40" cy="40" r="34"/>
          <circle class="arco-prog" id="arco-minutos" cx="40" cy="40" r="34"/>
        </svg>
        <div class="arco-inner">
          <span class="arco-num" id="minutos">00</span>
        </div>
      </div>
      <span class="arco-lbl">Minutos</span>
    </div>

    <div class="arco-item" id="arco-item-segundos" aria-label="Segundos">
      <div class="arco-wrap">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle class="arco-track" cx="40" cy="40" r="34"/>
          <circle class="arco-prog" id="arco-segundos" cx="40" cy="40" r="34"/>
        </svg>
        <div class="arco-inner">
          <span class="arco-num" id="segundos">00</span>
        </div>
      </div>
      <span class="arco-lbl">Segundos</span>
    </div>

  </div>

  <p class="contador-data" id="contador-data-label"></p>

  <div class="section-ctas">
    <a href="cerimonia.html" class="section-cta section-cta-principal">Ver informações da cerimônia</a>
    <a href="presentes.html" class="section-cta section-cta-secundario">Escolher um presente</a>
  </div>

</section>
